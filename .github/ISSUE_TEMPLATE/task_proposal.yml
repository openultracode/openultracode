name: Task proposal
description: Propose a small implementation, test, or docs task.
title: "Task: "
labels:
  - good first issue
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: State one narrow change that can be finished and verified.
      placeholder: Add a focused test for `ouc status --json` when the run is missing.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely files
      description: List the files or modules expected to change.
      placeholder: |
        - `src/cli.ts`
        - `tests/cli.test.ts`
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which commands should prove the task works?
      placeholder: |
        npm test -- tests/cli.test.ts
        npm run typecheck
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope checks
      options:
        - label: This task avoids unrelated refactors.
          required: true
        - label: This task preserves local run artifacts.
          required: true
